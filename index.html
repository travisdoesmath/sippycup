<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #code-input {
            width: 500px;
            height: 200px;
        }
    </style>
</head>
<body>
    <textarea id="code-input">
from flask import Flask, render_template

app = Flask(__name__)

@app.route("/")
def index():
    return render_template('index.html', msg="Hello, World!")
    </textarea>
    <button id="run" disabled>Loading...</button>
    <iframe></iframe>
    <script>
        let worker = new Worker('worker.js');

        worker.addEventListener("message", function handleMessage(msg) {
            if (msg.data.command == "ready") {
                let runButton = document.querySelector('#run')
                runButton.innerText = "Run";
                runButton.removeAttribute('disabled')

                let codeArea = document.querySelector('#code-input')
                

                runButton.addEventListener('click', function(event) {
                    console.log('click')
                    console.log(codeArea.value)
                    worker.postMessage({'src':codeArea.value})
                })
            }
            if (msg.data.command == "response") {
                let iframe = document.querySelector('iframe')
                console.log(msg.data.data)
                const blob = new Blob([msg.data.data.replace(/\\n/g, '\n')], {type: 'text/html'});
                iframe.src = window.URL.createObjectURL(blob);
            }
        })
    </script>
    
</body>
</html>
